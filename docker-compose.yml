version: '3.8'

services:
  vibe-kanban:
    build: .
    container_name: vibe-kanban
    ports:
      # Port 3000 cho Frontend
      - "3000:3000"
      # Port 3001 cho Backend (nếu cần)
      - "3001:3001"
    volumes:
      # Mount toàn bộ dự án hiện tại vào container để vibe-kanban quản lý source code và git
      - .:/app
    environment:
      # Cấu hình port cho server
      - PORT=3000
      - FRONTEND_PORT=3000
      - BACKEND_PORT=3001
      # (Tuỳ chọn) Nếu bạn muốn config OpenAI API tự động, bạn có thể truyền biến này vào
      # - OPENAI_API_KEY=your_api_key_he
    
    # Giữ container chạy và interactive nếu cần thiết
    stdin_open: true
    tty: true

  # Chạy OmniRoute như một dịch vụ độc lập song song (Khuyến nghị chuẩn Docker)
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    ports:
      # Port mặc định để gọi API và xem Dashboard (truy cập: http://localhost:20128)
      - "20128:20128"
    volumes:
      # Lưu trữ SQLite database của bản thân OmniRoute
      - omniroute-data:/app/data

  fastcode:
    build:
      context: ./FastCode
      dockerfile: Dockerfile
    container_name: fastcode
    ports:
      - "8001:8001"
    volumes:
      # Configuration
      - ./FastCode/.env:/app/.env:ro
      - ./FastCode/config:/app/config:ro

      # Persistent data (indexes, cache, repos, logs)
      - ./FastCode/data:/app/data
      - ./FastCode/repos:/app/repos
      - ./FastCode/logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
    restart: unless-stopped

  nanobot:
    build:
      context: ./FastCode/nanobot
      dockerfile: Dockerfile
    container_name: fastcode-nanobot
    command: ["gateway"]
    ports:
      - "18791:18790"
    volumes:
      # Nanobot configuration (飞书/Telegram token 等)
      - ./FastCode/nanobot_config.json:/root/.nanobot/config.json:ro

      # Persistent workspace data
      - nanobot-workspace:/root/.nanobot/workspace
      - nanobot-sessions:/root/.nanobot/sessions

      # Shared: nanobot can access FastCode repos
      - ./FastCode/repos:/app/repos:ro
    environment:
      - NANOBOT_ENV=docker
      # Internal API URL for nanobot -> FastCode communication
      - FASTCODE_API_URL=http://fastcode:8001
    depends_on:
      - fastcode
    restart: unless-stopped

volumes:
  omniroute-data:
  nanobot-workspace:
  nanobot-sessions:
